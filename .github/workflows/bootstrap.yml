name: CE-IA · Conexión y piloto gratuito

on:
  workflow_dispatch:
    inputs:
      modo:
        description: Acción que se ejecutará
        required: true
        default: comprobar_conexion
        type: choice
        options:
          - comprobar_conexion
          - probar_gemini
          - piloto_un_tramite

permissions:
  contents: read

concurrency:
  group: ceia-piloto-manual
  cancel-in-progress: false

jobs:
  ceia:
    name: CE-IA · ${{ inputs.modo }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CEIA_WP_URL: ${{ secrets.CEIA_WP_URL }}
      CEIA_WP_USER: ${{ secrets.CEIA_WP_USER }}
      CEIA_WP_APP_PASSWORD: ${{ secrets.CEIA_WP_APP_PASSWORD }}
      CEIA_WORKER_ID: github-actions-manual
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Descargar siempre el main actual
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Verificar worker 0.10.6 y REST estable
        shell: bash
        run: |
          set -euo pipefail
          echo "Commit descargado: $(git rev-parse HEAD)"
          PROVIDER="worker/ceia_worker/providers/gemini.py"
          grep --line-number --fixed-string ':generateContent' "$PROVIDER"
          grep --line-number --fixed-string 'responseMimeType' "$PROVIDER"
          if grep --line-number --fixed-string 'interactions.create' "$PROVIDER"; then
            echo "ERROR: se ha detectado la API experimental de Gemini."
            exit 1
          fi
          if grep --line-number --fixed-string 'response_json_schema' "$PROVIDER"; then
            echo "ERROR: aún se está enviando un JSON Schema incompatible."
            exit 1
          fi
          if grep --line-number --fixed-string 'google.genai' "$PROVIDER"; then
            echo "ERROR: aún se está usando el SDK de Google."
            exit 1
          fi
          grep --line-number --fixed-string 'MANAGED_HOST = "www.unioviedo.es"' worker/ceia_worker/pipeline.py
          grep --line-number --fixed-string 'CORRECCIÓN TÉCNICA OBLIGATORIA' worker/ceia_worker/pipeline.py
          python - <<'PY'
          import pathlib, re
          text = pathlib.Path('worker/ceia_worker/__init__.py').read_text(encoding='utf-8')
          match = re.search(r'__version__\s*=\s*["\']([^"\']+)', text)
          version = match.group(1) if match else 'desconocida'
          print(f'Versión fuente: {version}')
          if version < '0.10.6':
              raise SystemExit('ERROR: versión del worker anterior a 0.10.6')
          PY

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/pyproject.toml

      - name: Instalar trabajador sin reutilizar paquete antiguo
        run: python -m pip install --no-cache-dir --force-reinstall ./worker

      - name: Verificar instalación efectiva
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import inspect
          import ceia_worker
          from ceia_worker.providers.gemini import GeminiProvider
          from ceia_worker.pipeline import _is_managed_item_url
          source = inspect.getsource(GeminiProvider)
          print(f'Versión instalada: {ceia_worker.__version__}')
          if ':generateContent' not in source:
              raise SystemExit('ERROR: no se instaló el endpoint REST estable')
          if 'interactions.create' in source or 'response_json_schema' in source or 'google.genai' in source:
              raise SystemExit('ERROR: se instaló accidentalmente una implementación antigua')
          if not _is_managed_item_url('https://www.unioviedo.es/cestudiantes/index.php/tramite-ejemplo/'):
              raise SystemExit('ERROR: el alcance del Consejo no admite una URL válida')
          if _is_managed_item_url('https://www.uniovi.es/estudios/'):
              raise SystemExit('ERROR: el alcance admite accidentalmente una URL externa')
          print('Proveedor Gemini REST y alcance del Consejo verificados.')
          PY

      - name: Comprobar conexión privada con WordPress
        run: ceia-worker status

      - name: Probar Gemini sin reclamar ningún trámite
        if: ${{ inputs.modo == 'probar_gemini' }}
        run: ceia-worker gemini-check

      - name: Ejecutar piloto de un único trámite
        if: ${{ inputs.modo == 'piloto_un_tramite' }}
        run: ceia-worker run --max-jobs 1
