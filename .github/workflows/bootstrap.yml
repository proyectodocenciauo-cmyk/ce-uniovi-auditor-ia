name: CE-IA · Conexión y piloto seguro

on:
  workflow_dispatch:
    inputs:
      modo:
        description: Acción que se ejecutará
        required: true
        default: comprobar_conexion
        type: choice
        options:
          - comprobar_conexion
          - probar_gemini
          - piloto_seguro_un_tramite

permissions:
  contents: read

concurrency:
  group: ceia-piloto-seguro
  cancel-in-progress: false

jobs:
  ceia:
    name: CE-IA · ${{ inputs.modo }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CEIA_WP_URL: ${{ secrets.CEIA_WP_URL }}
      CEIA_WP_USER: ${{ secrets.CEIA_WP_USER }}
      CEIA_WP_APP_PASSWORD: ${{ secrets.CEIA_WP_APP_PASSWORD }}
      CEIA_WORKER_ID: github-actions-safe-pilot
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Descargar siempre el main actual
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Verificar versión y barreras obligatorias
        shell: bash
        run: |
          set -euo pipefail
          echo "Commit descargado: $(git rev-parse HEAD)"
          grep --fixed-string '__version__ = "0.12.0"' worker/ceia_worker/__init__.py
          grep --fixed-string ':generateContent' worker/ceia_worker/providers/gemini.py
          grep --fixed-string 'supports' worker/ceia_worker/providers/gemini.py
          grep --fixed-string 'retention < 0.80' worker/ceia_worker/validation.py
          grep --fixed-string 'render_responsive' worker/ceia_worker/pipeline.py
          grep --fixed-string 'EvidenceRetriever' worker/ceia_worker/pipeline.py
          grep --fixed-string 'CEIA_Quality::evaluate_result' wordpress/ce-ia-auditor/includes/class-ceia-rest-controller.php
          grep --fixed-string 'CEIA_Quality::pre_publish' wordpress/ce-ia-auditor/includes/class-ceia-publisher.php
          if grep --fixed-string 'interactions.create' worker/ceia_worker/providers/gemini.py; then
            echo 'ERROR: API experimental detectada.'
            exit 1
          fi
          if grep --fixed-string 'google.genai' worker/ceia_worker/providers/gemini.py; then
            echo 'ERROR: SDK antiguo detectado.'
            exit 1
          fi

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/pyproject.toml

      - name: Instalar trabajador seguro
        run: python -m pip install --no-cache-dir --force-reinstall './worker[dev]'

      - name: Instalar Chromium para capturas responsive
        run: playwright install --with-deps chromium

      - name: Ejecutar pruebas de seguridad antes de conectar
        run: pytest worker/tests

      - name: Verificar instalación efectiva
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import ceia_worker
          from ceia_worker.pipeline import _is_managed_item_url
          if ceia_worker.__version__ != '0.12.0':
              raise SystemExit('ERROR: worker instalado distinto de 0.12.0')
          if not _is_managed_item_url('https://www.unioviedo.es/cestudiantes/index.php/tramite-ejemplo/'):
              raise SystemExit('ERROR: una URL válida del Consejo fue rechazada')
          if _is_managed_item_url('https://www.uniovi.es/estudios/'):
              raise SystemExit('ERROR: se aceptó una página externa')
          print('Worker seguro 0.12.0 y alcance del Consejo verificados.')
          PY

      - name: Comprobar conexión privada con WordPress
        run: ceia-worker status

      - name: Probar Gemini sin reclamar ningún trámite
        if: ${{ inputs.modo == 'probar_gemini' }}
        run: ceia-worker gemini-check

      - name: Ejecutar piloto seguro de un único trámite
        if: ${{ inputs.modo == 'piloto_seguro_un_tramite' }}
        run: ceia-worker run --max-jobs 1
