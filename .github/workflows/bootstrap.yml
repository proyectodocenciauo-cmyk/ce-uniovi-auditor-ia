name: CE-IA · Conexión y piloto gratuito

on:
  workflow_dispatch:
    inputs:
      modo:
        description: Acción que se ejecutará
        required: true
        default: comprobar_conexion
        type: choice
        options:
          - comprobar_conexion
          - probar_gemini
          - piloto_un_tramite

permissions:
  contents: read

concurrency:
  group: ceia-piloto-manual
  cancel-in-progress: false

jobs:
  ceia:
    name: CE-IA · ${{ inputs.modo }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CEIA_WP_URL: ${{ secrets.CEIA_WP_URL }}
      CEIA_WP_USER: ${{ secrets.CEIA_WP_USER }}
      CEIA_WP_APP_PASSWORD: ${{ secrets.CEIA_WP_APP_PASSWORD }}
      CEIA_WORKER_ID: github-actions-manual
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Descargar siempre el main actual
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Verificar worker 0.10.3 y API estable
        shell: bash
        run: |
          set -euo pipefail
          echo "Commit descargado: $(git rev-parse HEAD)"
          if grep -R --line-number --fixed-string "interactions.create" worker/ceia_worker; then
            echo "ERROR: se ha detectado la API experimental de Gemini."
            exit 1
          fi
          grep -R --line-number --fixed-string "client.models.generate_content" worker/ceia_worker/providers/gemini.py
          grep -R --line-number --fixed-string "response_json_schema" worker/ceia_worker/providers/gemini.py
          python - <<'PY'
          import pathlib, re
          text = pathlib.Path('worker/ceia_worker/__init__.py').read_text(encoding='utf-8')
          match = re.search(r'__version__\s*=\s*["\']([^"\']+)', text)
          version = match.group(1) if match else 'desconocida'
          print(f'Versión fuente: {version}')
          if version < '0.10.3':
              raise SystemExit('ERROR: versión del worker anterior a 0.10.3')
          PY

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/pyproject.toml

      - name: Instalar trabajador sin reutilizar paquete antiguo
        run: python -m pip install --no-cache-dir --force-reinstall ./worker

      - name: Verificar instalación efectiva
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import inspect
          import ceia_worker
          from ceia_worker.providers.gemini import GeminiProvider
          source = inspect.getsource(GeminiProvider.analyze)
          print(f'Versión instalada: {ceia_worker.__version__}')
          if 'interactions.create' in source:
              raise SystemExit('ERROR: se instaló accidentalmente el proveedor antiguo')
          if 'models.generate_content' not in source:
              raise SystemExit('ERROR: no se instaló el proveedor estable esperado')
          if 'response_json_schema' not in source:
              raise SystemExit('ERROR: falta la configuración JSON Schema compatible')
          print('Proveedor Gemini estable y esquema compatible verificados.')
          PY

      - name: Comprobar conexión privada con WordPress
        run: ceia-worker status

      - name: Probar Gemini sin reclamar ningún trámite
        if: ${{ inputs.modo == 'probar_gemini' }}
        run: ceia-worker gemini-check

      - name: Ejecutar piloto de un único trámite
        if: ${{ inputs.modo == 'piloto_un_tramite' }}
        run: ceia-worker run --max-jobs 1
