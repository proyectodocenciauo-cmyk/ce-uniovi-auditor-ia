name: CE-IA · Pruebas

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar código
        uses: actions/checkout@v7

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/pyproject.toml

      - name: Instalar trabajador
        run: python -m pip install ./worker

      - name: Pruebas Python y controles estáticos
        run: PYTHONPATH=worker python -m unittest discover -s worker/tests -v

      - name: Comprobar sintaxis PHP
        run: find wordpress/ce-ia-auditor -name '*.php' -print0 | xargs -0 -n1 php -l
