name: CE-IA · Procesamiento automático

on:
  workflow_dispatch:
    inputs:
      source:
        description: Origen de la ejecución
        required: false
        default: wordpress
        type: string
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

concurrency:
  group: ceia-procesamiento
  cancel-in-progress: false

jobs:
  procesar:
    name: Procesar cola CE-IA
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CEIA_WP_URL: ${{ secrets.CEIA_WP_URL }}
      CEIA_WP_USER: ${{ secrets.CEIA_WP_USER }}
      CEIA_WP_APP_PASSWORD: ${{ secrets.CEIA_WP_APP_PASSWORD }}
      CEIA_WORKER_ID: github-actions-auto
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Descargar el código actual
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/pyproject.toml

      - name: Instalar el trabajador actual
        run: python -m pip install --no-cache-dir --force-reinstall ./worker

      - name: Comprobar WordPress
        run: ceia-worker status

      - name: Procesar la cola según el límite de WordPress
        run: ceia-worker run --success-if-completed
