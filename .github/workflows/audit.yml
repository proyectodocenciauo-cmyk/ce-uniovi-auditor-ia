name: CE-IA · Auditoría segura

on:
  workflow_dispatch:
    inputs:
      source:
        description: Origen de la ejecución
        required: false
        default: wordpress
        type: string

permissions:
  contents: read

concurrency:
  group: ceia-auditoria-segura
  cancel-in-progress: false

jobs:
  procesar:
    name: Validar y procesar cola CE-IA
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CEIA_WP_URL: ${{ secrets.CEIA_WP_URL }}
      CEIA_WP_USER: ${{ secrets.CEIA_WP_USER }}
      CEIA_WP_APP_PASSWORD: ${{ secrets.CEIA_WP_APP_PASSWORD }}
      CEIA_WORKER_ID: github-actions-safe
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Descargar el código actual
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/pyproject.toml

      - name: Instalar el trabajador seguro
        run: python -m pip install --no-cache-dir --force-reinstall './worker[dev]'

      - name: Instalar Chromium para pruebas responsive reales
        run: playwright install --with-deps chromium

      - name: Ejecutar pruebas de seguridad
        run: pytest worker/tests

      - name: Comprobar WordPress
        run: ceia-worker status

      - name: Procesar la cola según el límite de WordPress
        run: ceia-worker run --success-if-completed
